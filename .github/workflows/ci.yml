name: CI

# Runs on every push/PR so that type errors, lint failures, or broken
# tests are caught before merge — this is the CI pipeline called for in
# both the code-review and portfolio-evaluation audits (previously there
# was no CI configuration of any kind in this repository).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: CareConnectApp (typecheck, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CareConnectApp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CareConnectApp/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # `--detectOpenHandles` (also set by default in the `test` script
      # itself, see package.json) surfaces any lingering
      # timer/socket/listener that would otherwise cause Jest to hang or
      # exit non-deterministically — this is the fix for the
      # portfolio-evaluation audit's TEST-04 finding, which reproduced a
      # flaky pass/fail on `AuthContext.test.tsx` running this exact
      # command twice against the same commit.
      - name: Run tests with coverage
        run: npm test -- --ci --coverage --detectOpenHandles

  functions:
    name: Cloud Functions (typecheck, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci

  firestore-rules:
    name: Firestore & Storage rules (Emulator Suite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Exercises the *actual* firestore.rules/storage.rules files against
      # a real (emulated) Firestore/Storage instance via
      # @firebase/rules-unit-testing — this is the integration-test gap
      # both audits flagged as the most consequential remaining testing
      # hole: unit tests mock the SDK entirely and never verify the rules
      # themselves enforce what this project's documentation claims they
      # enforce.
      - name: Run Firestore/Storage rules tests against the Emulator Suite
        run: firebase emulators:exec --project demo-careconnect --only firestore,storage "npm run test:rules"
